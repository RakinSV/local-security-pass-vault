name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Before submitting, please search existing issues to avoid duplicates.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: "Describe the pain point. e.g. 'I often need to share a password with a team member but there is no way to export a single item...'"
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to see?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds you've tried or other approaches?

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Cryptography / security
        - Desktop UI
        - Browser extension
        - Auto-fill behaviour
        - Import / export
        - Browser integration / IPC
        - Build / packaging
        - Documentation
        - Other
