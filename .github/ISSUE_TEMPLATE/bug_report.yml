name: Bug Report
description: Something isn't working as expected
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill in as much detail as possible.
        **Do not include passwords, vault contents, or other sensitive data.**

  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Desktop app (Tauri)
        - Browser extension
        - Auto-fill / content script
        - Native messaging / IPC
        - Vault open / unlock
        - CSV import
        - Settings / browser integration
        - Build / compilation
        - Other
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: "e.g. Windows 11 22H2, Ubuntu 24.04"
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Browser (if applicable)
      placeholder: "e.g. Chrome 124, Firefox 125"

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open the app
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or error messages
      description: Paste any error output here (no sensitive data!)
      render: shell
