name: Build

# Triggered manually or on version tags.
on:
  workflow_dispatch:
  push:
    tags: ['v*']

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Desktop app ──────────────────────────────────────────────────────────────
  desktop:
    name: Desktop (${{ matrix.label }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            label: windows-x64

          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            label: linux-x64

          - os: macos-latest
            target: aarch64-apple-darwin
            label: macos-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # ── System deps ──────────────────────────────────────────────────────────
      - name: System deps (Linux)
        if: runner.os == 'Linux'
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libdbus-1-dev \
            libsecret-1-dev

      # ── Frontend ─────────────────────────────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Install frontend deps
        working-directory: desktop
        run: npm ci

      # ── Tauri build ──────────────────────────────────────────────────────────
      - name: Build desktop (Windows — NSIS installer)
        if: runner.os == 'Windows'
        working-directory: desktop
        run: npm run tauri -- build --target ${{ matrix.target }} --bundles nsis

      - name: Build desktop (Linux — AppImage)
        if: runner.os == 'Linux'
        working-directory: desktop
        run: npm run tauri -- build --target ${{ matrix.target }} --bundles appimage

      - name: Build desktop (macOS — DMG)
        if: runner.os == 'macOS'
        env:
          # Skip Apple code-signing in CI (no signing identity available).
          APPLE_SIGNING_IDENTITY: '-'
        working-directory: desktop
        run: npm run tauri -- build --target ${{ matrix.target }} --bundles dmg

      # ── Artifacts ────────────────────────────────────────────────────────────
      - name: Upload Windows installer
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: lspv-desktop-${{ matrix.label }}
          path: target/${{ matrix.target }}/release/bundle/nsis/*.exe
          retention-days: 30

      - name: Upload Linux AppImage
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: lspv-desktop-${{ matrix.label }}
          path: target/${{ matrix.target }}/release/bundle/appimage/*.AppImage
          retention-days: 30

      - name: Upload macOS DMG
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: lspv-desktop-${{ matrix.label }}
          path: target/${{ matrix.target }}/release/bundle/dmg/*.dmg
          retention-days: 30

  # ── GitHub Release (only on version tags) ────────────────────────────────
  release:
    name: Publish GitHub Release
    needs: [desktop]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List downloaded artifacts
        run: find artifacts -type f | sort

      - name: Upload artifacts to existing release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.ref_name }}"
          REPO="${{ github.repository }}"
          # Create release if it doesn't exist yet.
          # Mark as pre-release only for tags containing -alpha/-beta/-rc;
          # stable version tags (e.g. v0.2.4) get a proper release.
          if ! gh release view "$TAG" --repo "$REPO" &>/dev/null; then
            echo "Creating release $TAG"
            PRERELEASE_FLAG=""
            if echo "$TAG" | grep -qE '\-(alpha|beta|rc)[0-9]*$'; then
              PRERELEASE_FLAG="--prerelease"
            fi
            gh release create "$TAG" \
              --repo "$REPO" \
              --title "LSPV $TAG" \
              --generate-notes \
              $PRERELEASE_FLAG
          else
            echo "Release $TAG already exists"
          fi
          # Upload each artifact individually — handles filenames with spaces
          while IFS= read -r -d '' f; do
            echo "Uploading: $f"
            gh release upload "$TAG" "$f" --repo "$REPO" --clobber
          done < <(find artifacts -type f -print0)
