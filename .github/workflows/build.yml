name: Build

# Triggered manually or on version tags.
on:
  workflow_dispatch:
  push:
    tags: ['v*']

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Desktop app ──────────────────────────────────────────────────────────────
  desktop:
    name: Desktop (${{ matrix.label }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            label: windows-x64

          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            label: linux-x64

          - os: macos-latest
            target: aarch64-apple-darwin
            label: macos-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # ── System deps ──────────────────────────────────────────────────────────
      - name: System deps (Linux)
        if: runner.os == 'Linux'
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libdbus-1-dev \
            libsecret-1-dev

      # ── Frontend ─────────────────────────────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Install frontend deps
        working-directory: desktop
        run: npm ci

      # ── Tauri build ──────────────────────────────────────────────────────────
      - name: Build desktop (Windows — NSIS installer)
        if: runner.os == 'Windows'
        working-directory: desktop
        run: npm run tauri -- build --target ${{ matrix.target }} --bundles nsis

      - name: Build desktop (Linux — AppImage)
        if: runner.os == 'Linux'
        working-directory: desktop
        run: npm run tauri -- build --target ${{ matrix.target }} --bundles appimage

      - name: Build desktop (macOS — DMG)
        if: runner.os == 'macOS'
        working-directory: desktop
        env:
          # Skip Apple code-signing in CI (no signing identity available).
          # Builds a valid but unsigned DMG for distribution.
          APPLE_SIGNING_IDENTITY: '-'
        run: npm run tauri -- build --target ${{ matrix.target }} --bundles dmg

      # ── Artifacts ────────────────────────────────────────────────────────────
      - name: Upload Windows installer
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: vaultpass-desktop-${{ matrix.label }}
          path: target/${{ matrix.target }}/release/bundle/nsis/*.exe
          retention-days: 30

      - name: Upload Linux AppImage
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: vaultpass-desktop-${{ matrix.label }}
          path: target/${{ matrix.target }}/release/bundle/appimage/*.AppImage
          retention-days: 30

      - name: Upload macOS DMG
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: vaultpass-desktop-${{ matrix.label }}
          path: target/${{ matrix.target }}/release/bundle/dmg/*.dmg
          retention-days: 30

  # ── Native messaging host ─────────────────────────────────────────────────
  native-host:
    name: Native host (${{ matrix.label }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            label: windows-x64
            bin: vaultpass-native-host.exe

          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            label: linux-x64
            bin: vaultpass-native-host

          - os: macos-latest
            target: aarch64-apple-darwin
            label: macos-arm64
            bin: vaultpass-native-host

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: System deps (Linux)
        if: runner.os == 'Linux'
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            libssl-dev

      - name: Build native host
        run: >
          cargo build -p vaultpass-native-host
          --release
          --target ${{ matrix.target }}

      - name: Upload native host
        uses: actions/upload-artifact@v4
        with:
          name: vaultpass-native-host-${{ matrix.label }}
          path: target/${{ matrix.target }}/release/${{ matrix.bin }}
          retention-days: 30

  # ── GitHub Release (only on version tags) ────────────────────────────────
  release:
    name: Publish GitHub Release
    needs: [desktop, native-host]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List downloaded artifacts
        run: find artifacts -type f | sort

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.ref_name }}"
          gh release create "$TAG" \
            --repo "${{ github.repository }}" \
            --title "VaultPass $TAG" \
            --generate-notes \
            artifacts/vaultpass-desktop-windows-x64/*.exe \
            artifacts/vaultpass-desktop-linux-x64/*.AppImage \
            artifacts/vaultpass-desktop-macos-arm64/*.dmg \
            artifacts/vaultpass-native-host-windows-x64/*.exe \
            artifacts/vaultpass-native-host-linux-x64/vaultpass-native-host \
            artifacts/vaultpass-native-host-macos-arm64/vaultpass-native-host
