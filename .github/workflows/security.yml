name: Security

on:
  push:
  pull_request:
  schedule:
    - cron: "0 3 * * 1" # еженедельно, понедельник 03:00 UTC — fuzzing

env:
  CARGO_TERM_COLOR: always

jobs:
  audit:
    name: cargo audit (CVE)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install build deps
        run: sudo apt-get update && sudo apt-get install -y build-essential
      - run: cargo install cargo-audit --locked
      - run: cargo audit

  test:
    name: tests + crypto vectors
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux: only test pure-Rust crates (core-vault + native-host).
          # vaultpass-desktop pulls Tauri's GTK stack which is unavailable
          # on bare ubuntu-latest runners without a full desktop install.
          - os: ubuntu-latest
            cargo_args: -p core-vault -p vaultpass-native-host
          # Windows: full workspace (winreg + Tauri compile without GTK).
          - os: windows-latest
            cargo_args: --workspace
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build deps (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y build-essential
      - run: cargo test ${{ matrix.cargo_args }} --all-features

  clippy:
    name: clippy (-D warnings)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - run: sudo apt-get update && sudo apt-get install -y build-essential
      # Same rationale as test matrix: skip vaultpass-desktop on Linux
      # to avoid GTK system dependency requirement.
      - run: cargo clippy -p core-vault -p vaultpass-native-host --all-targets -- -D warnings

  typescript:
    name: TypeScript type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            extension/package-lock.json
            desktop/package-lock.json
      - name: Check extension
        working-directory: extension
        run: npm ci && npx tsc --noEmit
      - name: Check desktop
        working-directory: desktop
        run: npm ci && npx tsc --noEmit

  fuzz:
    name: fuzzing (weekly)
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - run: cargo install cargo-fuzz --locked
      - run: sudo apt-get update && sudo apt-get install -y build-essential
      - run: cargo fuzz run fuzz_vault_open -- -max_total_time=300
      - run: cargo fuzz run fuzz_item_deserialize -- -max_total_time=300
