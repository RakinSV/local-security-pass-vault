[package]
name = "vaultpass-desktop"
version = "0.1.0"
edition = "2021"

# The _lib suffix avoids a name collision between the binary and lib on Windows.
# See https://github.com/rust-lang/cargo/issues/8519
[lib]
name = "vaultpass_desktop_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
uuid = { version = "1", features = ["v4"] }
core-vault = { path = "../../core-vault" }

[lints.clippy]
unwrap_used = "warn"
expect_used = "warn"
